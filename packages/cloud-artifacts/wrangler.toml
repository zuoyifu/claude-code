name = "cloud-artifacts"
main = "src/index.ts"
compatibility_date = "2026-06-20"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cloud-artifacts"

[vars]
PUBLIC_URL = "https://cloud-artifacts.claude-code-best.win"
DEFAULT_TTL_DAYS = "7"
MAX_TTL_DAYS = "30"
MAX_BYTES = "10485760"

[observability]
enabled = true
